#Location: ~/.config/starship.toml
#What_is_starship: https://starship.rs/

add_newline = true
command_timeout = 2000

format = """$env_var$os$username$hostname$kubernetes$directory$git_branch$git_status$python
$character
"""

[character]
success_symbol = "Ôò░ÔÄ»´äà"
error_symbol = "Ôò░ÔÄ»´äà"
# Ôò¡Ôò┤ Ôò░ÔöÇ

[env_var]
symbol = "Ôò¡Ôò┤"
variable = 'SHELL'
format = "$symbol"
disabled = false


#warp-Drop ugly default prompt characters
#success_symbol = ""
#error_symbol = ""

# ---

[os]
format = '[$symbol](bold white) '   
disabled = false

[os.symbols]
Windows = '¯İ¬ '
Arch = '¾░úç'
Ubuntu = '´îø'
Macos = '¾░ÇÁ'
Unknown = '¾░áÑ'

# ---y

# Shows the username
[username]
style_user = 'yellow bold'
style_root = 'black bold'
format = '[//](black bold) [$user](#2883ff) ' # 2883ff
disabled = false
show_always = true

# Shows the hostname
[hostname]
ssh_only = false
format = '[//](black bold) [$hostname](bold blue) '
disabled = false

# Shows current directory
[directory]
truncation_length = 0
truncation_symbol = 'ÔÇĞ/'
home_symbol = '~'
# read_only_style = '197'
read_only = ' ´Çú '
format = '[//](black bold) [$path]($style)[$read_only]($read_only_style) '
style = '#7ed1fb' # yellow bold


# Shows current git branch
[git_branch]
# symbol = '´çÆ '
symbol = '´çô '
format = '[//](black bold) [$symbol\[$branch\]]($style) '
# truncation_length = 0
# truncation_symbol = 'ÔÇĞ/'
style = 'bold green'

# Shows current git status
[git_status]
disabled = true
format = '[ $all_status $ahead_behind]($style) '
style = 'bold green'
conflicted = '­şÅ│'
up_to_date = ''
untracked = '´ö® '
ahead = 'Ôçí${count}'
diverged = 'ÔçòÔçí${ahead_count}Ôçú${behind_count}'
behind = 'Ôçú${count}'
stashed = '´úû '
modified = '´üä '
staged = '[++\($count\)](green)'
renamed = '×Ñü '
deleted = '´Çö '

