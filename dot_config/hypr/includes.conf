# This content was generated by nwg-shell-config. Do not modify it manually.

# VARIABLES
$term = kitty
$browser = brave --enable-features=UseOzonePlatform --ozone-platform=wayland
$filemanager = thunar
$editor = /usr/bin/emacsclient -c -a= -n
$launcher = rofi -show drun
$exit = $launcher

# AUTOSTART
exec-once = swaync -c /home/willefi/.config/swaync/hyprland.json -s /home/willefi/.config/swaync/hyprland-0.css
exec-once = waybar
exec-once = gsconnect
exec-once = nm-applet --indicator
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec = swayidle timeout 1200 nwg-lock timeout 1800 'systemctl suspend'  

# GENERAL SETTINGS
general {
    border_size = 2
    no_border_on_floating = false
    gaps_in = 3
    gaps_out = 3
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
    extend_border_grab_area = true
    hover_icon_on_border = true
}

# DWINDLE LAYOUT 
dwindle {
    pseudotile = false
    force_split = 1
    preserve_split = true
    smart_split = false
    smart_resizing = true
    special_scale_factor = 0.8
    split_width_multiplier = 1.0
    no_gaps_when_only = false
    use_active_for_splits = true
    default_split_ratio = 1.0
}

# MASTER LAYOUT 
master {
    allow_small_split = false
    special_scale_factor = 0.8
    mfact = 0.55
    new_is_master = true
    new_on_top = false
    no_gaps_when_only = false
    orientation = left
    inherit_fullscreen = true
    always_center_master = false
}

# INPUT DEVICES
input {
    kb_layout = us,fr
    kb_variant = colemak,azerty
    kb_options = ctrl:nocaps,shift:both_capslock,grp:ctrls_toggle
    repeat_rate = 25
    repeat_delay = 597
    follow_mouse = 0
    mouse_refocus = true
    float_switch_override_focus = 1
    touchpad {
        disable_while_typing = true
        scroll_factor = 1.0
        tap-to-click = true
    }
}

# MISC SETTINGS
misc {
    disable_hyprland_logo = true
    vrr = 0
    mouse_move_enables_dpms = false
    key_press_enables_dpms = false
    layers_hog_keyboard_focus = true
    focus_on_activate = false
    hide_cursor_on_touch = true
    mouse_move_focuses_monitor = true
}

# KEY BINDINGS
bindr = SUPER, SUPER_L, exec, $launcher
